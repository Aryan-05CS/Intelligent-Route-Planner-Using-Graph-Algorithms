<!DOCTYPE html>
<html>

<head>

<title>
Intelligent Route Planner
</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h1 class="mb-4">
Intelligent Route Planner
</h1>

<div class="card p-4">

<form action="/route"
      method="POST">

<label>
Source
</label>

<select
class="form-select"
name="source">

{% for city in locations %}

<option>
{{ city }}
</option>

{% endfor %}

</select>

<br>

<label>
Destination
</label>

<select
class="form-select"
name="destination">

{% for city in locations %}

<option>
{{ city }}
</option>

{% endfor %}

</select>

<br>

<button
class="btn btn-success"
type="submit">

Find Route

</button>

</form>

</div>

</div>

</body>

</html>
